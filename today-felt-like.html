<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Today felt like…</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;1,400;1,500&family=Playfair+Display:ital,wght@1,500;1,600;1,700&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────────────────
   RESET & BASE
───────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; }
body {
  font-family:'Lora',serif;
  color:#241810;
  background:#f5ede0;
  cursor:none;
}
a, button, input { cursor:none; }

/* ─────────────────────────────────────────
   CUSTOM CURSOR
───────────────────────────────────────── */
#cur-dot {
  position:fixed; z-index:99999; pointer-events:none;
  width:8px; height:8px; border-radius:50%;
  background:#b06840;
  transform:translate(-50%,-50%);
  transition:width .2s ease, height .2s ease, background .4s ease, opacity .3s ease;
  mix-blend-mode:multiply;
}
#cur-ring {
  position:fixed; z-index:99998; pointer-events:none;
  width:28px; height:28px; border-radius:50%;
  border:1.5px solid rgba(176,104,64,.38);
  transform:translate(-50%,-50%);
  transition:border-color .4s ease, opacity .3s ease;
  /* ring lags behind with JS */
}
/* expanded state on hover over interactive elements */
body.cursor-hover #cur-dot { width:12px; height:12px; background:#8c4828; }
body.cursor-hover #cur-ring { width:42px; height:42px; border-color:rgba(140,72,40,.28); }
body.cursor-click #cur-dot { width:5px; height:5px; }
body.cursor-click #cur-ring { width:18px; height:18px; }

/* ─────────────────────────────────────────
   ATMOSPHERE
───────────────────────────────────────── */
#bg {
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse at 20% 15%, rgba(220,168,128,.22) 0%, transparent 52%),
    radial-gradient(ellipse at 80% 80%, rgba(148,176,140,.16) 0%, transparent 52%),
    radial-gradient(ellipse at 65% 5%,  rgba(210,190,168,.13) 0%, transparent 44%),
    #f5ede0;
  transition:background 2.8s ease;
}
#bg-shimmer {
  position:fixed; inset:0; z-index:0;
  background:radial-gradient(ellipse at 50% 50%, rgba(255,252,245,.4) 0%, transparent 68%);
  animation:shimmer 9s ease-in-out infinite;
}
@keyframes shimmer {
  0%,100%{ transform:scale(1) translate(0,0); opacity:.55; }
  40%{ transform:scale(1.08) translate(2%,2.5%); opacity:.75; }
  70%{ transform:scale(.96) translate(-1.5%,2%); opacity:.45; }
}
#grain {
  position:fixed; inset:0; z-index:1; pointer-events:none; opacity:.032;
  background-image:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
  background-size:200px 200px;
}
#canvas { position:fixed; inset:0; z-index:2; pointer-events:none; opacity:0; transition:opacity 1.8s ease; }
#canvas.visible { opacity:1; }

/* ─────────────────────────────────────────
   SCREEN SYSTEM — 3D PAGE FLIP
───────────────────────────────────────── */
#stage {
  position:fixed; inset:0; z-index:10;
  perspective:1100px;
  perspective-origin:50% 48%;
}
.screen {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none;
  transform-origin:center center;
  backface-visibility:hidden;
  will-change:transform,opacity;
}
.screen.active { opacity:1; pointer-events:all; }

/* Flip OUT — current page folds away to the left */
@keyframes pageFlipOut {
  0%   { transform:perspective(1100px) rotateY(0deg) scale(1);      opacity:1; }
  60%  { transform:perspective(1100px) rotateY(-70deg) scale(.88);  opacity:.4; }
  100% { transform:perspective(1100px) rotateY(-88deg) scale(.82);  opacity:0; }
}
/* Flip IN — new page unfolds from the right */
@keyframes pageFlipIn {
  0%   { transform:perspective(1100px) rotateY(82deg) scale(.82);   opacity:0; }
  40%  { transform:perspective(1100px) rotateY(18deg) scale(.94);   opacity:.7; }
  100% { transform:perspective(1100px) rotateY(0deg) scale(1);      opacity:1; }
}
/* Flip back (result → input) */
@keyframes pageFlipOutR {
  0%   { transform:perspective(1100px) rotateY(0deg) scale(1);      opacity:1; }
  60%  { transform:perspective(1100px) rotateY(70deg) scale(.88);   opacity:.4; }
  100% { transform:perspective(1100px) rotateY(88deg) scale(.82);   opacity:0; }
}
@keyframes pageFlipInR {
  0%   { transform:perspective(1100px) rotateY(-82deg) scale(.82);  opacity:0; }
  40%  { transform:perspective(1100px) rotateY(-18deg) scale(.94);  opacity:.7; }
  100% { transform:perspective(1100px) rotateY(0deg) scale(1);      opacity:1; }
}
.screen.flip-out  { animation:pageFlipOut  .48s cubic-bezier(.4,0,.6,1) forwards; }
.screen.flip-in   { animation:pageFlipIn   .56s cubic-bezier(.22,1,.36,1) forwards; }
.screen.flip-out-r{ animation:pageFlipOutR .45s cubic-bezier(.4,0,.6,1) forwards; }
.screen.flip-in-r { animation:pageFlipInR  .52s cubic-bezier(.22,1,.36,1) forwards; }

/* ─────────────────────────────────────────
   FLOAT-UP ENTRY (for children)
───────────────────────────────────────── */
@keyframes floatUp {
  from { transform:translateY(20px); opacity:0; }
  to   { transform:translateY(0);    opacity:1; }
}
@keyframes fadeInUp {
  from { opacity:0; transform:translateY(7px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ─────────────────────────────────────────
   INPUT SCREEN
───────────────────────────────────────── */
.journal-wrap {
  text-align:center; padding:2rem 1.5rem;
  animation:floatUp 1.1s cubic-bezier(.22,1,.36,1) both;
}

.journal-label {
  font-family:'Caveat',cursive; font-size:.8rem; color:#b89880;
  letter-spacing:.22em; text-transform:uppercase; margin-bottom:1.5rem;
}

/* ── Season Picker ── */
.season-section { margin-bottom:1.9rem; }
.season-hint {
  font-family:'Caveat',cursive; font-size:.72rem; color:#c4a888;
  letter-spacing:.16em; text-transform:uppercase; margin-bottom:.6rem; opacity:.88;
}
.season-row { display:flex; gap:.48rem; justify-content:center; flex-wrap:wrap; }

.season-pill {
  position:relative; display:inline-flex; align-items:center; gap:.32rem;
  padding:.32rem .9rem; border-radius:50px; border:1px solid; background:transparent;
  font-family:'Caveat',cursive; font-size:.86rem; letter-spacing:.03em;
  overflow:hidden; user-select:none;
  transition:transform .32s cubic-bezier(.34,1.56,.64,1),
             box-shadow .32s ease, border-color .32s ease, color .22s ease;
}
.season-pill::before {
  content:''; position:absolute; inset:0; opacity:0; transition:opacity .32s ease; pointer-events:none;
}
.season-pill:hover { transform:translateY(-2px); }
.season-pill:hover::before, .season-pill.active::before { opacity:1; }
.season-pill.active { transform:translateY(-2px); }
.season-pill .s-icon { font-size:.78rem; line-height:1; }
.season-pill .s-dot {
  position:absolute; top:5px; right:6px; width:4px; height:4px; border-radius:50%;
  opacity:0; transform:scale(0); transition:all .28s ease;
}
.season-pill.active .s-dot { opacity:1; transform:scale(1); }

.season-pill[data-season="spring"] { border-color:rgba(110,168,86,.48); color:#3e7230; }
.season-pill[data-season="spring"]::before { background:linear-gradient(135deg,rgba(158,210,130,.22),rgba(232,192,210,.2)); }
.season-pill[data-season="spring"]:hover, .season-pill[data-season="spring"].active { border-color:rgba(110,168,86,.8); color:#2c5820; box-shadow:0 4px 20px rgba(110,168,86,.2); }
.season-pill[data-season="spring"] .s-dot { background:#78c050; }

.season-pill[data-season="summer"] { border-color:rgba(200,158,42,.44); color:#6e4e08; }
.season-pill[data-season="summer"]::before { background:linear-gradient(135deg,rgba(232,198,80,.22),rgba(244,174,60,.18)); }
.season-pill[data-season="summer"]:hover, .season-pill[data-season="summer"].active { border-color:rgba(200,158,42,.8); color:#503808; box-shadow:0 4px 20px rgba(200,158,42,.2); }
.season-pill[data-season="summer"] .s-dot { background:#c8a020; }

.season-pill[data-season="autumn"] { border-color:rgba(185,88,48,.44); color:#6e2e14; }
.season-pill[data-season="autumn"]::before { background:linear-gradient(135deg,rgba(204,104,58,.2),rgba(192,148,60,.16)); }
.season-pill[data-season="autumn"]:hover, .season-pill[data-season="autumn"].active { border-color:rgba(185,88,48,.78); color:#521c08; box-shadow:0 4px 20px rgba(185,88,48,.2); }
.season-pill[data-season="autumn"] .s-dot { background:#c05030; }

.season-pill[data-season="winter"] { border-color:rgba(88,140,182,.44); color:#1e4862; }
.season-pill[data-season="winter"]::before { background:linear-gradient(135deg,rgba(148,192,224,.22),rgba(202,228,246,.2)); }
.season-pill[data-season="winter"]:hover, .season-pill[data-season="winter"].active { border-color:rgba(88,140,182,.78); color:#143652; box-shadow:0 4px 20px rgba(88,140,182,.2); }
.season-pill[data-season="winter"] .s-dot { background:#6aabce; }

/* ── Prompt ── */
.prompt-stack { display:flex; flex-direction:column; align-items:center; gap:.08rem; }
.prompt-text {
  font-family:'Playfair Display',serif; font-style:italic; font-weight:600;
  font-size:clamp(1.9rem,5.2vw,3.5rem); color:#241810; line-height:1.18; user-select:none;
}
.input-wrapper { position:relative; width:min(440px,84vw); margin-top:.5rem; }
#feeling-input {
  width:100%; background:transparent; border:none;
  border-bottom:1.5px solid rgba(168,120,88,.45); outline:none;
  font-family:'Caveat',cursive; font-size:clamp(1.6rem,4.2vw,2.7rem); font-weight:600;
  color:#5c3418; text-align:center; padding:.3rem .5rem .6rem;
  transition:border-color .4s, color .3s; caret-color:#b06840;
}
#feeling-input::placeholder { color:rgba(168,120,88,.55); font-weight:400; font-style:italic; }
#feeling-input:focus { border-color:rgba(140,88,56,.72); }
.input-underline {
  position:absolute; bottom:0; left:50%; transform:translateX(-50%);
  width:0; height:1.5px; background:linear-gradient(90deg,#c07848,#d09060);
  transition:width .4s ease; border-radius:2px;
}
#feeling-input:focus ~ .input-underline { width:100%; }

.submit-btn {
  margin-top:2.6rem; display:inline-flex; align-items:center; gap:.55rem;
  background:none; border:1.5px solid rgba(148,96,64,.3); border-radius:50px;
  padding:.58rem 1.9rem; font-family:'Caveat',cursive; font-size:1.02rem;
  color:#8c5030; letter-spacing:.07em;
  transition:all .3s ease; position:relative; overflow:hidden;
}
.submit-btn::before {
  content:''; position:absolute; inset:0; border-radius:50px;
  background:linear-gradient(135deg,rgba(176,104,64,.1),rgba(200,144,80,.08));
  opacity:0; transition:opacity .3s;
}
.submit-btn:hover { border-color:rgba(148,96,64,.62); transform:translateY(-2px); box-shadow:0 6px 24px rgba(148,96,64,.14); }
.submit-btn:hover::before { opacity:1; }
.submit-btn .enter-hint { font-size:.72rem; opacity:.5; font-family:'Lora',serif; font-style:italic; }

/* ─────────────────────────────────────────
   LOADING SCREEN
───────────────────────────────────────── */
#screen-loading .loading-inner { text-align:center; }
.dots { display:flex; gap:10px; justify-content:center; margin-bottom:1.3rem; }
.dots span {
  width:7px; height:7px; border-radius:50%;
  background:rgba(176,120,88,.65); animation:dotPulse 1.5s ease-in-out infinite;
}
.dots span:nth-child(2){ animation-delay:.22s; }
.dots span:nth-child(3){ animation-delay:.44s; }
@keyframes dotPulse { 0%,100%{opacity:.2;transform:scale(.7);} 50%{opacity:1;transform:scale(1);} }
.loading-text { font-family:'Caveat',cursive; font-size:1.02rem; color:#b09070; letter-spacing:.07em; }

/* ─────────────────────────────────────────
   RESULT SCREEN
───────────────────────────────────────── */
.result-card {
  position:relative; text-align:center;
  padding:3rem 2.5rem 2.5rem; max-width:min(600px,90vw);
}
/* paper texture backing */
.result-card::before {
  content:''; position:absolute; inset:-28px -32px;
  border-radius:18px;
  background:rgba(248,242,232,.48);
  backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(212,180,148,.22);
  box-shadow:0 12px 48px rgba(120,70,40,.08), inset 0 1px 0 rgba(255,248,240,.7);
  z-index:-1;
}
/* subtle top rule */
.result-card::after {
  content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:48px; height:1.5px;
  background:linear-gradient(90deg,transparent,rgba(180,130,90,.5),transparent);
  border-radius:2px;
}

.result-season-badge {
  display:none; align-items:center; justify-content:center; gap:.4rem;
  font-family:'Caveat',cursive; font-size:.74rem; letter-spacing:.22em; text-transform:uppercase;
  margin-bottom:.7rem; opacity:0; animation:fadeInUp .5s ease .1s forwards;
}
.result-season-badge.visible { display:flex; }
.result-season-badge .rs-swatch { width:7px; height:7px; border-radius:50%; }

.result-sentence {
  font-family:'Playfair Display',serif; font-style:italic; font-weight:600;
  font-size:clamp(1.5rem,3.8vw,2.55rem); color:#1e1208; line-height:1.48; margin-bottom:.85rem;
}
.result-mood-tag {
  display:inline-block; font-family:'Caveat',cursive; font-size:.8rem;
  letter-spacing:.24em; text-transform:uppercase; color:#9a7858; margin-bottom:1.5rem;
  opacity:0; animation:fadeInUp .6s ease .42s forwards;
}
.result-reflection {
  font-family:'Lora',serif; font-style:italic;
  font-size:clamp(.9rem,1.9vw,1.06rem); color:#6a5040; line-height:1.9;
  max-width:430px; margin:0 auto 2.5rem;
  opacity:0; animation:fadeInUp .7s ease .72s forwards;
}
.result-actions {
  display:flex; gap:.85rem; justify-content:center; flex-wrap:wrap;
  opacity:0; animation:fadeInUp .6s ease 1.02s forwards;
}
.action-btn {
  background:none; border:1.5px solid rgba(148,108,80,.28); border-radius:50px;
  padding:.48rem 1.4rem; font-family:'Caveat',cursive; font-size:.96rem;
  color:#8c5e3a; letter-spacing:.04em;
  transition:all .3s; position:relative; overflow:hidden;
}
.action-btn::before {
  content:''; position:absolute; inset:0; border-radius:50px;
  background:rgba(160,104,64,.08); opacity:0; transition:opacity .3s;
}
.action-btn:hover { border-color:rgba(148,108,80,.6); transform:translateY(-1px); box-shadow:0 4px 16px rgba(148,108,80,.12); }
.action-btn:hover::before { opacity:1; }
.action-btn.sound-on { background:rgba(148,108,80,.1); border-color:rgba(148,108,80,.5); }

/* ─────────────────────────────────────────
   TOAST
───────────────────────────────────────── */
#toast {
  position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(60px);
  background:rgba(48,28,16,.88); color:#f8ede0;
  font-family:'Caveat',cursive; font-size:1rem;
  padding:.68rem 1.6rem; border-radius:50px;
  opacity:0; transition:all .4s ease; z-index:9999; pointer-events:none;
  backdrop-filter:blur(8px); box-shadow:0 4px 20px rgba(0,0,0,.2);
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Cursor -->
<div id="cur-dot"></div>
<div id="cur-ring"></div>

<!-- Atmosphere -->
<div id="bg"></div>
<div id="bg-shimmer"></div>
<div id="grain"></div>
<canvas id="canvas"></canvas>

<!-- ════════ STAGE ════════ -->
<div id="stage">

  <!-- Input -->
  <div id="screen-input" class="screen active">
    <div class="journal-wrap">
      <p class="journal-label">a little reflection for today</p>

      <div class="season-section">
        <p class="season-hint">set a season mood &middot; optional</p>
        <div class="season-row">
          <button class="season-pill" data-season="spring" onclick="selectSeason('spring')">
            <span class="s-icon">&#10047;</span><span>spring</span><span class="s-dot"></span>
          </button>
          <button class="season-pill" data-season="summer" onclick="selectSeason('summer')">
            <span class="s-icon">&#9728;</span><span>summer</span><span class="s-dot"></span>
          </button>
          <button class="season-pill" data-season="autumn" onclick="selectSeason('autumn')">
            <span class="s-icon">&#11080;</span><span>autumn</span><span class="s-dot"></span>
          </button>
          <button class="season-pill" data-season="winter" onclick="selectSeason('winter')">
            <span class="s-icon">&#10052;</span><span>winter</span><span class="s-dot"></span>
          </button>
        </div>
      </div>

      <div class="prompt-stack">
        <span class="prompt-text">Today felt like</span>
        <div class="input-wrapper">
          <input type="text" id="feeling-input"
            placeholder="a warm cup of tea&hellip;"
            autocomplete="off" maxlength="80" spellcheck="false" />
          <div class="input-underline"></div>
        </div>
      </div>
      <button class="submit-btn" id="submit-btn">
        <span>enter the feeling</span>
        <span class="enter-hint">&#8629;</span>
      </button>
    </div>
  </div>

  <!-- Loading -->
  <div id="screen-loading" class="screen">
    <div class="loading-inner">
      <div class="dots"><span></span><span></span><span></span></div>
      <p class="loading-text">sitting with the feeling&hellip;</p>
    </div>
  </div>

  <!-- Result -->
  <div id="screen-result" class="screen">
    <div class="result-card">
      <div class="result-season-badge" id="result-season-badge">
        <span class="rs-swatch" id="rs-swatch"></span>
        <span id="rs-label"></span>
      </div>
      <p class="result-sentence" id="result-sentence"></p>
      <span class="result-mood-tag" id="result-mood"></span>
      <p class="result-reflection" id="result-reflection"></p>
      <div class="result-actions">
        <button class="action-btn" id="sound-btn" onclick="toggleSound()">&#9834; ambient sound</button>
        <button class="action-btn" onclick="resetApp()">&larr; another day</button>
      </div>
    </div>
  </div>

</div><!-- /stage -->

<div id="toast"></div>

<script>
// ════════════════════════════════════
// CURSOR
// ════════════════════════════════════
var dot  = document.getElementById('cur-dot');
var ring = document.getElementById('cur-ring');
var mx=window.innerWidth/2, my=window.innerHeight/2;
var rx=mx, ry=my;
var dotX=mx, dotY=my;

document.addEventListener('mousemove', function(e){
  mx=e.clientX; my=e.clientY;
  dot.style.left=mx+'px'; dot.style.top=my+'px';
});

// Ring lags smoothly behind dot
(function ringLoop(){
  rx += (mx-rx)*.14;
  ry += (my-ry)*.14;
  ring.style.left=rx+'px'; ring.style.top=ry+'px';
  requestAnimationFrame(ringLoop);
})();

document.addEventListener('mouseover', function(e){
  var t = e.target;
  if(t.matches('button,input,.season-pill,.action-btn,.submit-btn')){
    document.body.classList.add('cursor-hover');
  }
});
document.addEventListener('mouseout', function(e){
  var t = e.target;
  if(t.matches('button,input,.season-pill,.action-btn,.submit-btn')){
    document.body.classList.remove('cursor-hover');
  }
});
document.addEventListener('mousedown', function(){ document.body.classList.add('cursor-click'); });
document.addEventListener('mouseup',   function(){ document.body.classList.remove('cursor-click'); });

// ════════════════════════════════════
// SEASONS
// ════════════════════════════════════
var SEASONS = {
  spring:{
    label:'spring', icon:'\u2747',
    primary:'#98cc74', secondary:'#ebbccc',
    bgBase:'#f0f8e8', textAccent:'#2e6020',
    animBias:'petals', soundBias:'forest',
    swatchColor:'#78c050',
    placeholder:'fresh rain on new leaves\u2026',
  },
  summer:{
    label:'summer', icon:'\u2600',
    primary:'#eac848', secondary:'#f4a838',
    bgBase:'#fdf6e0', textAccent:'#604808',
    animBias:'fireflies', soundBias:'ocean',
    swatchColor:'#c8a020',
    placeholder:'long golden afternoons\u2026',
  },
  autumn:{
    label:'autumn', icon:'\u2b48',
    primary:'#cc6838', secondary:'#c09040',
    bgBase:'#f8ede0', textAccent:'#601c08',
    animBias:'leaves', soundBias:'wind',
    swatchColor:'#b84828',
    placeholder:'wood smoke and fallen leaves\u2026',
  },
  winter:{
    label:'winter', icon:'\u2744',
    primary:'#88b8d8', secondary:'#b8d8ee',
    bgBase:'#ecf4fa', textAccent:'#103850',
    animBias:'snow', soundBias:'wind',
    swatchColor:'#5898c8',
    placeholder:'silence under a grey sky\u2026',
  }
};

// ════════════════════════════════════
// STATE
// ════════════════════════════════════
var activeSeason=null;
var audioCtx=null, soundNodes=null, soundType='chimes', soundOn=false, chimeTimer=null;
var animFrame=null, particles=[];

// ════════════════════════════════════
// SCREEN / FLIP
// ════════════════════════════════════
var screens = {
  input:   document.getElementById('screen-input'),
  loading: document.getElementById('screen-loading'),
  result:  document.getElementById('screen-result')
};

function flipTo(nextName, reverse) {
  var current = null;
  Object.keys(screens).forEach(function(k){
    if(screens[k].classList.contains('active')) current=screens[k];
  });
  var next = screens[nextName];
  if(!next || next===current) return;

  var outClass = reverse ? 'flip-out-r' : 'flip-out';
  var inClass  = reverse ? 'flip-in-r'  : 'flip-in';

  if(current) {
    current.classList.add(outClass);
    setTimeout(function(){
      current.classList.remove('active', outClass);
    }, 460);
  }

  // Slight delay so the fold-away is visible before the new page arrives
  setTimeout(function(){
    next.style.opacity='0';
    next.classList.add('active', inClass);
    // Remove the in class after animation completes (it stays active)
    setTimeout(function(){
      next.classList.remove(inClass);
      next.style.opacity='';
    }, 580);
  }, current ? 200 : 0);
}

// Simple instant show for loading (no flip needed)
function showLoading() {
  Object.values(screens).forEach(function(s){
    s.classList.remove('active','flip-out','flip-in','flip-out-r','flip-in-r');
    s.style.opacity='';
  });
  screens.loading.classList.add('active');
}

function toast(msg, dur) {
  dur=dur||2800;
  var el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); },dur);
}

// ════════════════════════════════════
// SEASON PICKER
// ════════════════════════════════════
function selectSeason(key) {
  if(activeSeason===key){
    activeSeason=null;
    document.querySelectorAll('.season-pill').forEach(function(p){ p.classList.remove('active'); });
    resetBg(null);
    document.getElementById('feeling-input').placeholder='a warm cup of tea\u2026';
    return;
  }
  activeSeason=key;
  var sn=SEASONS[key];
  document.querySelectorAll('.season-pill').forEach(function(p){
    p.classList.toggle('active', p.dataset.season===key);
  });
  applyBgPreview(sn);
  document.getElementById('feeling-input').placeholder=sn.placeholder;
}

function applyBgPreview(sn) {
  document.getElementById('bg').style.background=
    'radial-gradient(ellipse at 20% 18%, '+sn.primary+'48 0%, transparent 52%),'+
    'radial-gradient(ellipse at 80% 78%, '+sn.secondary+'3c 0%, transparent 52%),'+
    'radial-gradient(ellipse at 58% 95%, '+sn.primary+'22 0%, transparent 44%),'+
    sn.bgBase;
}

function resetBg(sn) {
  if(sn) { applyBgPreview(sn); return; }
  document.getElementById('bg').style.background=
    'radial-gradient(ellipse at 20% 15%, rgba(220,168,128,.22) 0%, transparent 52%),'+
    'radial-gradient(ellipse at 80% 80%, rgba(148,176,140,.16) 0%, transparent 52%),'+
    'radial-gradient(ellipse at 65% 5%,  rgba(210,190,168,.13) 0%, transparent 44%),'+
    '#f5ede0';
}

// ════════════════════════════════════
// INPUT
// ════════════════════════════════════
document.getElementById('feeling-input').addEventListener('keydown',function(e){
  if(e.key==='Enter') handleSubmit();
});
document.getElementById('submit-btn').addEventListener('click', handleSubmit);

function handleSubmit(){
  var val=document.getElementById('feeling-input').value.trim();
  if(!val){ toast('what did today feel like? \u2726'); document.getElementById('feeling-input').focus(); return; }
  showLoading();
  analyzeFeeling(val).then(function(r){ applyMood(val,r); })
  .catch(function(err){
    console.error(err);
    var sn=activeSeason?SEASONS[activeSeason]:null;
    applyMood(val,{
      animationType:sn?sn.animBias:'fireflies',
      soundType:sn?sn.soundBias:'chimes',
      primaryColor:sn?sn.primary:'#c89870',
      secondaryColor:sn?sn.secondary:'#a8b8c8',
      reflection:'whatever today carried, you met it with quiet grace.',
      mood:'reflective'
    });
  });
}

// ════════════════════════════════════
// ANTHROPIC API
// ════════════════════════════════════
function analyzeFeeling(text){
  var hint='';
  if(activeSeason){
    var map={spring:'soft greens, blush pink, dewy freshness',summer:'golden light, warm amber, sun-drenched',autumn:'terracotta, burnt sienna, ochre warmth',winter:'pale blue, silver frost, crisp stillness'};
    hint='\nThe user chose a '+activeSeason+' seasonal mood \u2014 let this tint your colors and reflection ('+map[activeSeason]+').';
  }
  return fetch('https://api.anthropic.com/v1/messages',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514', max_tokens:400,
      messages:[{role:'user',content:'The user finished "Today felt like '+text+'".'+hint+'\n\nReply ONLY valid JSON, no markdown:\n{"animationType":"fireflies|rain|leaves|snow|petals|stars|smoke|bubbles","soundType":"rain|fire|wind|ocean|forest|chimes","primaryColor":"#hex","secondaryColor":"#hex","reflection":"15-22 words second person lowercase","mood":"one evocative word"}'}]
    })
  }).then(function(r){return r.json();}).then(function(d){
    return JSON.parse(d.content[0].text.trim().replace(/```json|```/g,'').trim());
  });
}

// ════════════════════════════════════
// COLOR UTILS
// ════════════════════════════════════
function hexToRgb(h){ h=h.replace('#',''); return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; }
function blendHex(a,b,t){
  var ac=hexToRgb(a),bc=hexToRgb(b);
  return '#'+[0,1,2].map(function(i){ return Math.round(ac[i]+(bc[i]-ac[i])*t).toString(16).padStart(2,'0'); }).join('');
}
function hex2rgb(h){ h=h.replace('#',''); return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; }

// ════════════════════════════════════
// APPLY MOOD
// ════════════════════════════════════
function applyMood(input, r){
  document.getElementById('result-sentence').textContent='Today felt like '+input+'.';
  document.getElementById('result-mood').textContent=r.mood||'';
  document.getElementById('result-reflection').textContent=r.reflection||'';

  // Colour: if season active, blend season (dominant) with AI pick
  var p,s;
  if(activeSeason){
    var sn=SEASONS[activeSeason];
    p=blendHex(sn.primary,    r.primaryColor||sn.primary,   0.45);
    s=blendHex(sn.secondary,  r.secondaryColor||sn.secondary, 0.38);
  } else {
    p=r.primaryColor||'#c89870';
    s=r.secondaryColor||'#a8b8c8';
  }

  var bgBase=activeSeason?SEASONS[activeSeason].bgBase:'#f6eee0';
  document.getElementById('bg').style.background=
    'radial-gradient(ellipse at 22% 22%, '+p+'55 0%, transparent 54%),'+
    'radial-gradient(ellipse at 78% 72%, '+s+'48 0%, transparent 54%),'+
    'radial-gradient(ellipse at 52% 92%, '+p+'2a 0%, transparent 46%),'+
    bgBase;

  // Season badge
  var badge=document.getElementById('result-season-badge');
  if(activeSeason){
    var sn2=SEASONS[activeSeason];
    document.getElementById('rs-swatch').style.background=sn2.swatchColor;
    document.getElementById('rs-label').textContent=sn2.icon+' '+sn2.label;
    badge.style.color=sn2.textAccent;
    badge.style.animation='none';
    badge.classList.add('visible');
    requestAnimationFrame(function(){ badge.style.animation=''; });
  } else {
    badge.classList.remove('visible');
  }

  // Animation
  var animType=r.animationType||'fireflies';
  if(activeSeason && Math.random()<0.62) animType=SEASONS[activeSeason].animBias;

  document.getElementById('canvas').classList.add('visible');
  initParticles(animType, p, s);

  // Sound
  var chosenSound=r.soundType||'chimes';
  if(activeSeason && chosenSound==='chimes') chosenSound=SEASONS[activeSeason].soundBias;
  soundType=chosenSound;
  startSound(soundType);

  // Page flip to result
  flipTo('result', false);
  updateSoundBtn();
}

// ════════════════════════════════════
// PARTICLES
// ════════════════════════════════════
var cv=document.getElementById('canvas');
var cx=cv.getContext('2d');
function resize(){ cv.width=innerWidth; cv.height=innerHeight; }
resize();
window.addEventListener('resize', resize);

function initParticles(type,c1,c2){
  if(animFrame) cancelAnimationFrame(animFrame);
  particles=[];
  var rgb1=hex2rgb(c1), rgb2=hex2rgb(c2);
  var col1=rgb1[0]+','+rgb1[1]+','+rgb1[2];
  var col2=rgb2[0]+','+rgb2[1]+','+rgb2[2];
  var W=cv.width, H=cv.height;
  var counts={fireflies:44,rain:155,leaves:26,snow:105,petals:30,stars:88,smoke:16,bubbles:36};
  var n=counts[type]||38;
  for(var i=0;i<n;i++) particles.push(mkP(type,W,H,col1,col2));
  loop(type,col1,col2);
}

function mkP(type,W,H,c1,c2){
  var r=Math.random, pk=function(){return r()>.5?c1:c2;};
  switch(type){
    case 'fireflies': return{x:r()*W,y:r()*H,vx:(r()-.5)*.42,vy:(r()-.5)*.32,r:1.4+r()*2.4,phase:r()*Math.PI*2,spd:.5+r()*1.5,col:c1};
    case 'rain':      return{x:r()*W,y:r()*H-H,vy:5+r()*6,len:11+r()*22,op:.15+r()*.35,col:c1};
    case 'leaves':    return{x:r()*W,y:r()*H,vx:(r()-.5)*1.3,vy:.45+r()*1.0,rot:r()*Math.PI*2,spin:(r()-.5)*.048,sz:6+r()*13,wob:r()*Math.PI*2,ws:.018+r()*.028,op:.4+r()*.45,col:pk()};
    case 'snow':      return{x:r()*W,y:r()*H,vy:.35+r()*1.3,vx:(r()-.5)*.35,r:1.3+r()*2.8,phase:r()*Math.PI*2,op:.3+r()*.55};
    case 'petals':    return{x:r()*W,y:r()*H,vy:.3+r()*.7,phase:r()*Math.PI*2,ps:.009+r()*.022,amp:22+r()*52,rot:r()*Math.PI*2,spin:(r()-.5)*.02,w:4+r()*8,h:8+r()*13,op:.3+r()*.42,col:pk()};
    case 'stars':     return{x:r()*W,y:r()*H,r:.5+r()*2.2,phase:r()*Math.PI*2,spd:.28+r()*1.1,base:.28+r()*.58,col:pk()};
    case 'smoke':     return{x:W/2+(r()-.5)*80,y:H,vx:(r()-.5)*.48,vy:-(.35+r()*1.0),r:10+r()*18,grow:.15+r()*.25,op:.08+r()*.1,col:c1};
    case 'bubbles':   return{x:r()*W,y:H+r()*100,vy:-(.28+r()*.7),r:3+r()*14,phase:r()*Math.PI*2,ps:.009+r()*.018,amp:7+r()*18,op:.08+r()*.2,col:pk()};
    default: return{x:r()*W,y:r()*H};
  }
}

function loop(type,c1,c2){
  var W=cv.width, H=cv.height, t=performance.now()/1000;
  cx.clearRect(0,0,W,H);
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    switch(type){
      case 'fireflies':{
        p.x+=p.vx; p.y+=p.vy; p.phase+=p.spd*.016;
        if(p.x<0)p.x=W; if(p.x>W)p.x=0; if(p.y<0)p.y=H; if(p.y>H)p.y=0;
        var fl=.35+.65*Math.sin(p.phase);
        cx.shadowBlur=16*fl; cx.shadowColor='rgba('+p.col+','+fl+')';
        cx.beginPath(); cx.arc(p.x,p.y,p.r*(.65+.35*fl),0,Math.PI*2);
        cx.fillStyle='rgba('+p.col+','+(fl*.85)+')'; cx.fill(); cx.shadowBlur=0; break;
      }
      case 'rain':{
        p.y+=p.vy; if(p.y>H+30){p.y=-30;p.x=Math.random()*W;}
        cx.beginPath(); cx.moveTo(p.x,p.y); cx.lineTo(p.x+p.len*.1,p.y+p.len);
        cx.strokeStyle='rgba('+p.col+','+p.op+')'; cx.lineWidth=.8; cx.stroke(); break;
      }
      case 'leaves':{
        p.y+=p.vy; p.wob+=p.ws; p.x+=p.vx+Math.sin(p.wob)*.65; p.rot+=p.spin;
        if(p.y>H+20){p.y=-20;p.x=Math.random()*W;}
        cx.save(); cx.translate(p.x,p.y); cx.rotate(p.rot);
        cx.beginPath(); cx.ellipse(0,0,p.sz*.36,p.sz,0,0,Math.PI*2);
        cx.fillStyle='rgba('+p.col+','+p.op+')'; cx.fill(); cx.restore(); break;
      }
      case 'snow':{
        p.y+=p.vy; p.phase+=.011; p.x+=p.vx+Math.sin(p.phase)*.26;
        if(p.y>H){p.y=-8;p.x=Math.random()*W;}
        cx.beginPath(); cx.arc(p.x,p.y,p.r,0,Math.PI*2);
        cx.fillStyle='rgba(255,255,255,'+p.op+')'; cx.fill(); break;
      }
      case 'petals':{
        p.y+=p.vy; p.phase+=p.ps; p.x+=Math.sin(p.phase)*p.amp*.009; p.rot+=p.spin;
        if(p.y>H+20){p.y=-20;p.x=Math.random()*W;}
        cx.save(); cx.translate(p.x,p.y); cx.rotate(p.rot);
        cx.beginPath(); cx.ellipse(0,0,p.w/2,p.h/2,0,0,Math.PI*2);
        cx.fillStyle='rgba('+p.col+','+p.op+')'; cx.fill(); cx.restore(); break;
      }
      case 'stars':{
        var tw=p.base*(.42+.58*Math.sin(p.phase+t*p.spd));
        cx.beginPath(); cx.arc(p.x,p.y,p.r,0,Math.PI*2);
        cx.fillStyle='rgba('+p.col+','+tw+')'; cx.fill();
        if(p.r>1.3){ cx.shadowBlur=9; cx.shadowColor='rgba('+p.col+','+(tw*.5)+')'; cx.fill(); cx.shadowBlur=0; }
        break;
      }
      case 'smoke':{
        p.x+=p.vx; p.y+=p.vy; p.r+=p.grow; p.op-=.00075;
        if(p.op<=0||p.y<-p.r){ p.y=H; p.x=cv.width/2+(Math.random()-.5)*80; p.r=10+Math.random()*18; p.op=.08+Math.random()*.1; p.vx=(Math.random()-.5)*.48; }
        var g=cx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
        g.addColorStop(0,'rgba('+p.col+','+p.op+')'); g.addColorStop(1,'rgba('+p.col+',0)');
        cx.beginPath(); cx.arc(p.x,p.y,p.r,0,Math.PI*2); cx.fillStyle=g; cx.fill(); break;
      }
      case 'bubbles':{
        p.y+=p.vy; p.phase+=p.ps; p.x+=Math.sin(p.phase)*p.amp*.01;
        if(p.y<-p.r*3){p.y=H+p.r;p.x=Math.random()*cv.width;}
        cx.beginPath(); cx.arc(p.x,p.y,p.r,0,Math.PI*2);
        cx.strokeStyle='rgba('+p.col+','+p.op+')'; cx.lineWidth=1; cx.stroke();
        cx.beginPath(); cx.arc(p.x-p.r*.26,p.y-p.r*.26,p.r*.13,0,Math.PI*2);
        cx.fillStyle='rgba(255,255,255,'+(p.op*1.7)+')'; cx.fill(); break;
      }
    }
  }
  animFrame=requestAnimationFrame(function(){ loop(type,c1,c2); });
}

// ════════════════════════════════════
// AUDIO
// ════════════════════════════════════
function ensureAudio(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended') audioCtx.resume(); }
function mkNoise(buf){ var s=audioCtx.createBufferSource(); s.buffer=buf; s.loop=true; return s; }
function mkBuf(type){
  var sz=2*audioCtx.sampleRate, buf=audioCtx.createBuffer(1,sz,audioCtx.sampleRate), d=buf.getChannelData(0);
  if(type==='white'){for(var i=0;i<sz;i++)d[i]=Math.random()*2-1;}
  else if(type==='brown'){var l=0;for(var i=0;i<sz;i++){var w=Math.random()*2-1;d[i]=(l+.02*w)/1.02;l=d[i];d[i]*=3.5;}}
  else if(type==='pink'){var b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;for(var i=0;i<sz;i++){var w=Math.random()*2-1;b0=.99886*b0+w*.0555179;b1=.99332*b1+w*.0750759;b2=.96900*b2+w*.1538520;b3=.86650*b3+w*.3104856;b4=.55000*b4+w*.5329522;b5=-.7616*b5-w*.0168980;d[i]=(b0+b1+b2+b3+b4+b5+b6+w*.5362)*.11;b6=w*.115926;}}
  return buf;
}

function startSound(type){
  ensureAudio(); killSound();
  var master=audioCtx.createGain(); master.gain.setValueAtTime(0,audioCtx.currentTime); master.connect(audioCtx.destination);
  var toKill=[master];
  var fi=function(v,t){t=t||2;master.gain.linearRampToValueAtTime(v,audioCtx.currentTime+t);};
  switch(type){
    case 'rain':{ var s=mkNoise(mkBuf('white')),hp=audioCtx.createBiquadFilter(),lp=audioCtx.createBiquadFilter(); hp.type='highpass';hp.frequency.value=280;lp.type='lowpass';lp.frequency.value=1400;lp.Q.value=.4; s.connect(hp);hp.connect(lp);lp.connect(master);s.start();fi(.28);toKill.push(s,hp,lp);break; }
    case 'fire':{ var s=mkNoise(mkBuf('brown')),bp=audioCtx.createBiquadFilter(),lp=audioCtx.createBiquadFilter(); bp.type='bandpass';bp.frequency.value=240;bp.Q.value=.9;lp.type='lowpass';lp.frequency.value=550; s.connect(bp);bp.connect(lp);lp.connect(master);s.start();fi(.38);toKill.push(s,bp,lp);break; }
    case 'wind':{ var s=mkNoise(mkBuf('pink')),bp=audioCtx.createBiquadFilter(),lfo=audioCtx.createOscillator(),lg=audioCtx.createGain(); bp.type='bandpass';bp.frequency.value=380;bp.Q.value=.25;lfo.frequency.value=.08;lg.gain.value=90; lfo.connect(lg);lg.connect(bp.frequency);s.connect(bp);bp.connect(master);s.start();lfo.start();fi(.22);toKill.push(s,bp,lfo,lg);break; }
    case 'ocean':{ var s=mkNoise(mkBuf('pink')),lp=audioCtx.createBiquadFilter(),lfo=audioCtx.createOscillator(),lg=audioCtx.createGain(); lp.type='lowpass';lp.frequency.value=650;lfo.frequency.value=.065;lg.gain.value=.14; lfo.connect(lg);lg.connect(master.gain);s.connect(lp);lp.connect(master);s.start();lfo.start();master.gain.setValueAtTime(.26,audioCtx.currentTime+2);toKill.push(s,lp,lfo,lg);break; }
    case 'forest':{ var s=mkNoise(mkBuf('pink')),hp=audioCtx.createBiquadFilter(),lp=audioCtx.createBiquadFilter(); hp.type='highpass';hp.frequency.value=220;lp.type='lowpass';lp.frequency.value=1100; s.connect(hp);hp.connect(lp);lp.connect(master);s.start();fi(.14);toKill.push(s,hp,lp);break; }
    case 'chimes':{
      master.gain.setValueAtTime(.7,audioCtx.currentTime);
      var scale=[523.25,587.33,659.25,783.99,880,1046.5,1174.66,1318.51];
      function chime(){
        if(!soundOn||!chimeTimer) return;
        var f=scale[Math.floor(Math.random()*scale.length)];
        var osc=audioCtx.createOscillator(),env=audioCtx.createGain();
        osc.type='sine';osc.frequency.value=f;
        env.gain.setValueAtTime(0,audioCtx.currentTime);
        env.gain.linearRampToValueAtTime(.18,audioCtx.currentTime+.04);
        env.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+2.8);
        osc.connect(env);env.connect(master);osc.start();osc.stop(audioCtx.currentTime+3);
        if(Math.random()>.4){
          var o2=audioCtx.createOscillator(),e2=audioCtx.createGain();
          o2.type='sine';o2.frequency.value=f*1.5;
          e2.gain.setValueAtTime(0,audioCtx.currentTime);
          e2.gain.linearRampToValueAtTime(.06,audioCtx.currentTime+.03);
          e2.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+1.8);
          o2.connect(e2);e2.connect(master);o2.start();o2.stop(audioCtx.currentTime+2);
        }
        chimeTimer=setTimeout(chime,1400+Math.random()*2800);
      }
      chimeTimer=setTimeout(chime,300); break;
    }
  }
  soundNodes=toKill; soundOn=true;
}

function killSound(){
  if(chimeTimer){clearTimeout(chimeTimer);chimeTimer=null;}
  if(!soundNodes) return;
  var captured=soundNodes; soundNodes=null;
  var master=captured[0];
  try{
    master.gain.cancelScheduledValues(audioCtx.currentTime);
    master.gain.linearRampToValueAtTime(0,audioCtx.currentTime+.6);
    setTimeout(function(){ captured.forEach(function(n){try{n.stop&&n.stop();n.disconnect&&n.disconnect();}catch(e){}}); },700);
  }catch(e){ captured.forEach(function(n){try{n.stop&&n.stop();n.disconnect&&n.disconnect();}catch(e2){}}); }
}
function toggleSound(){
  if(soundOn){soundOn=false;killSound();}else{soundOn=true;startSound(soundType);}
  updateSoundBtn();
}
function updateSoundBtn(){
  var b=document.getElementById('sound-btn');
  b.textContent=soundOn?'\u266b sound on':'\u266a sound off';
  b.classList.toggle('sound-on',soundOn);
}

// ════════════════════════════════════
// RESET
// ════════════════════════════════════
function resetApp(){
  soundOn=false; killSound();
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
  cx.clearRect(0,0,cv.width,cv.height);
  document.getElementById('canvas').classList.remove('visible');
  document.getElementById('feeling-input').value='';
  if(activeSeason){ var sn=SEASONS[activeSeason]; applyBgPreview(sn); document.getElementById('feeling-input').placeholder=sn.placeholder; }
  else{ resetBg(null); document.getElementById('feeling-input').placeholder='a warm cup of tea\u2026'; }
  // Re-arm animation on journal-wrap
  var w=document.querySelector('.journal-wrap');
  w.style.animation='none'; requestAnimationFrame(function(){ w.style.animation=''; });
  flipTo('input', true);
  setTimeout(function(){ document.getElementById('feeling-input').focus(); },500);
}

// Focus on load
setTimeout(function(){ document.getElementById('feeling-input').focus(); },600);
